    <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Document</title>
            <!-- Bootstrap 5 CDN -->
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
            <link rel="stylesheet" type="text/css" href="../estilos/juego.css">
        </head>
        <body>
            <h3 id="nombreCiudad" class="text-center my-4"> Una ciudad </h3>
            <p id="contadorResidenciales" class="text-center fw-semibold">Residenciales: 0 (Casas: 0, Apartamentos: 0)</p>
            <div class="container-fluid d-flex mt-3">
                <div class="col-auto me-4">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <button class="btn btn-primary w-100 mb-2" type="button" 
                                    data-bs-toggle="collapse" data-bs-target="#menuHerramientas">
                                Herramientas
                            </button>
        
                            <div class="collapse" id="menuHerramientas">
                                <div class="d-grid gap-2 border-top pt-2">
                                    
                                    <button class="btn btn-outline-success" type="button" 
                                            data-bs-toggle="collapse" data-bs-target="#opcionesConstruir">
                                        Construir
                                    </button>
        
                                    <div class="collapse" id="opcionesConstruir">
                                        <div class="d-grid gap-2 ms-2 border-start ps-2 my-2">
                                            
                                            <button class="btn btn-sm btn-light border" type="button" data-bs-toggle="collapse" data-bs-target="#tiposResidencia">Edificios residenciales</button>
                                            <div class="collapse ms-2" id="tiposResidencia">
                                                <div class="d-grid gap-1 py-1">
                                                    <button class="btn btn-objeto border" id="itemCasa" title="(Capacidad: 4, Costo: $1,000)">Casa</button>
                                                    <button class="btn btn-objeto border" id="itemApartamento" title="(Capacidad: 12, Costo: $3,000)">Apartamento</button>
                                                </div>
                                            </div>
        
                                            <button class="btn btn-sm btn-light border" type="button" data-bs-toggle="collapse" data-bs-target="#tipoComercial">Edificios comercial</button>
                                            <div class="collapse ms-2" id="tipoComercial">
                                                <div class="d-grid gap-1 py-1">
                                                    <button class="btn btn-objeto border" id="itemTienda" title="(Capacidad: 20, Costo: $5,000)">Tienda</button>
                                                    <button class="btn btn-objeto border" id="itemMall" title="(Capacidad: 100, Costo: $20,000)">Centro comercial</button>
                                                </div>
                                            </div>
        
                                            <button class="btn btn-sm btn-light border" type="button" data-bs-toggle="collapse" data-bs-target="#tipoIndustrial">Edificios industrial</button>
                                            <div class="collapse ms-2" id="tipoIndustrial">
                                                <div class="d-grid gap-1 py-1">
                                                    <button class="btn btn-objeto border" id="itemFabrica" title="(Capacidad: 50, Costo: $10,000)">Fabrica</button>
                                                    <button class="btn btn-objeto border" id="itemGranja" title="(Capacidad: 30, Costo: $7,000)">Granja</button>
                                                </div>
                                            </div>
        
                                            <button class="btn btn-sm btn-light border" type="button" data-bs-toggle="collapse" data-bs-target="#tipoServicio">Edificios de servicios</button>
                                            <div class="collapse ms-2" id="tipoServicio">
                                                <div class="d-grid gap-1 py-1">
                                                    <button class="btn btn-objeto border" id="itemPolicia" title="(Capacidad: 10, Costo: $5,000)">Policía</button>
                                                    <button class="btn btn-objeto border" id="itemBomberos" title="(Capacidad: 15, Costo: $8,000)">Bomberos</button>
                                                    <button class="btn btn-objeto border" id="itemHospital" title="(Capacidad: 50, Costo: $25,000)">Hospital</button>
                                                </div>
                                            </div>
        
                                            <button class="btn btn-sm btn-light border" type="button" data-bs-toggle="collapse" data-bs-target="#tipoUtilidad">Edificios de utilidad</button>
                                            <div class="collapse ms-2" id="tipoUtilidad">
                                                <div class="d-grid gap-1 py-1">
                                                    <button class="btn btn-objeto border" id="itemElectrica" title="(Capacidad: 100, Costo: $15,000)">Planta electrica</button>
                                                    <button class="btn btn-objeto border" id="itemAgua" title="(Capacidad: 200, Costo: $12,000)">Planta de agua</button>
                                                </div>
                                            </div>
        
                                            <button class="btn btn-sm btn-light border" id="itemParque" title="Parque">Parque</button>
                                            <button class="btn btn-sm btn-light border" id="itemVia" title="Vía">Vía</button>
                                        </div>
                                    </div>
        
                                    <button class="btn btn-outline-danger" id="btnDemoler">
                                        Destruir
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            <div id="grid-container">
                <div id="mapa" class="mapa"></div>
            </div>
            
            <script type="module" src="../../negocio/controladorJuego.js"></script>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        </body>
    </html>
