<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ranking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="../estilos/ranking.css">
</head>
<body>
    <header class="ranking-header">
        <h1>🏙 Ranking de Ciudades</h1>
        <p>Las mejores ciudades construidas por los alcaldes</p>
    </header>

    <section class="ranking-container">

        <div class="ranking-actions">
            <button id="btn-volver">⬅ Volver al juego</button>
            <button id="btn-exportar">⬇ Exportar JSON</button>
            <button id="btn-reset">🗑 Reiniciar Ranking</button>
        </div>

        <table class="ranking-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Ciudad</th>
                    <th>Alcalde</th>
                    <th>Puntuación</th>
                    <th>Población</th>
                    <th>Felicidad</th>
                    <th>Turnos</th>
                    <th>Fecha</th>
                </tr>
            </thead>

            <tbody id="ranking-body">
                <!-- aqui van las filas -->
            </tbody>
        </table>

    </section>

    <section class="player-position">
        <h3 id="player-ranking">
            <!-- Si el jugador no está en top 10 -->
        </h3>
    </section>

    <script type="module" src="../../negocio/controladorRanking.js"></script>
</body>
</html>
